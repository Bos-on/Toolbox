<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Toolbox</title>
  <link rel="icon" type="image/png" href="favicon.png">
  <link href="https://api.fontshare.com/v2/css?f[]=satoshi@700,500&f[]=general-sans@400,500,600&display=swap" rel="stylesheet">
  <style>
    /* ===== RESET ===== */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { -webkit-font-smoothing: antialiased; scroll-behavior: smooth; }
    body {
      min-height: 100dvh;
      font-family: var(--font-body, sans-serif);
      font-size: var(--text-base);
      color: var(--color-text);
      background-color: var(--color-bg);
      line-height: 1.6;
      transition: background-color 200ms ease, color 200ms ease;
    }
    img, svg { display: block; max-width: 100%; }
    input, button, select { font: inherit; color: inherit; }
    button { cursor: pointer; background: none; border: none; }
    :focus-visible { outline: 2px solid var(--color-primary); outline-offset: 3px; border-radius: var(--radius-sm); }

    /* ===== DESIGN TOKENS ===== */
    :root, [data-theme="light"] {
      --color-bg: #f7f6f2;
      --color-surface: #f9f8f5;
      --color-surface-2: #fbfbf9;
      --color-surface-offset: #f3f0ec;
      --color-border: #d4d1ca;
      --color-divider: #dcd9d5;
      --color-text: #28251d;
      --color-text-muted: #7a7974;
      --color-text-faint: #bab9b4;
      --color-primary: #01696f;
      --color-primary-hover: #0c4e54;
      --color-primary-highlight: #cedcd8;
      --color-success: #437a22;
      --color-success-hover: #2e5c10;
      --color-success-highlight: #d4dfcc;
      --color-gold: #d19900;
      --color-gold-highlight: #e9e0c6;
      --color-error: #a12c7b;
      --color-error-highlight: #e0ced7;
      --color-boss-gold: #9a6f1a;
      --color-boss-gold-dim: #c49030;
      --color-boss-red: #b83232;
      --color-boss-red-dim: #e06060;
      --shadow-sm: 0 1px 2px oklch(0.2 0.01 80 / 0.06);
      --shadow-md: 0 4px 12px oklch(0.2 0.01 80 / 0.08);
      --radius-sm: 0.375rem;
      --radius-md: 0.5rem;
      --radius-lg: 0.75rem;
      --radius-full: 9999px;
      --transition-interactive: 180ms cubic-bezier(0.16, 1, 0.3, 1);
      --font-display: 'Satoshi', 'Inter', sans-serif;
      --font-body: 'General Sans', 'Inter', sans-serif;
      --space-1: 0.25rem;
      --space-2: 0.5rem;
      --space-3: 0.75rem;
      --space-4: 1rem;
      --space-5: 1.25rem;
      --space-6: 1.5rem;
      --space-8: 2rem;
      --space-10: 2.5rem;
      --space-12: 3rem;
      --text-xs: clamp(0.75rem, 0.7rem + 0.25vw, 0.875rem);
      --text-sm: clamp(0.875rem, 0.8rem + 0.35vw, 1rem);
      --text-base: clamp(1rem, 0.95rem + 0.25vw, 1.125rem);
      --text-lg: clamp(1.125rem, 1rem + 0.75vw, 1.5rem);
      --text-xl: clamp(1.5rem, 1.2rem + 1.25vw, 2.25rem);
    }

    /* ===== COMMON COMPONENTS ===== */
    .btn-primary {
      background: var(--color-primary);
      color: #fff;
      border-radius: var(--radius-md);
      padding: var(--space-2) var(--space-5);
      font-size: var(--text-sm);
      font-weight: 500;
      transition: background var(--transition-interactive);
    }
    .btn-primary:hover { background: var(--color-primary-hover); }
    .btn-primary:active { transform: scale(0.98); }

    .btn-ghost {
      color: var(--color-text-muted);
      border: 1px solid oklch(from var(--color-text) l c h / 0.15);
      border-radius: var(--radius-md);
      padding: var(--space-2) var(--space-4);
      font-size: var(--text-sm);
      transition: color var(--transition-interactive), border-color var(--transition-interactive);
    }
    .btn-ghost:hover { color: var(--color-text); border-color: oklch(from var(--color-text) l c h / 0.3); }

    .input {
      background: var(--color-surface-2);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-md);
      padding: var(--space-2) var(--space-3);
      font-size: var(--text-base);
      width: 100%;
      color: var(--color-text);
      transition: border-color var(--transition-interactive), box-shadow var(--transition-interactive);
    }
    .input:focus { border-color: var(--color-primary); box-shadow: 0 0 0 3px var(--color-primary-highlight); outline: none; }
    .input.error { border-color: var(--color-error); box-shadow: 0 0 0 3px var(--color-error-highlight); }

    .card {
      background: var(--color-surface);
      border: 1px solid oklch(from var(--color-text) l c h / 0.08);
      border-radius: var(--radius-lg);
      padding: var(--space-6);
      box-shadow: var(--shadow-sm);
    }

    /* ===== HEADER ===== */
    .header {
      position: sticky;
      top: 0;
      z-index: 100;
      height: 56px;
      background: var(--color-surface);
      border-bottom: 1px solid var(--color-border);
      display: flex;
      align-items: center;
      padding: 0 var(--space-6);
      gap: var(--space-6);
    }

    .logo {
      display: flex;
      align-items: center;
      gap: var(--space-2);
      font-family: var(--font-display);
      font-size: var(--text-base);
      font-weight: 700;
      color: var(--color-text);
      flex-shrink: 0;
    }
    .logo img { width: 24px; height: 24px; }

    .tablist {
      display: flex;
      gap: var(--space-1);
      align-items: center;
      height: 100%;
    }
    .tab-btn {
      padding: var(--space-2) var(--space-4);
      font-size: var(--text-sm);
      font-weight: 500;
      color: var(--color-text-muted);
      border-bottom: 2px solid transparent;
      border-radius: 0;
      transition: color var(--transition-interactive), border-color var(--transition-interactive);
      height: 100%;
      display: flex;
      align-items: center;
    }
    .tab-btn:hover { color: var(--color-text); }
    .tab-btn[aria-selected="true"] {
      color: var(--color-primary);
      border-bottom-color: var(--color-primary);
    }

    /* ===== MAIN CONTENT ===== */
    .container {
      max-width: 960px;
      margin: 0 auto;
      padding: var(--space-8) var(--space-6);
    }

    .tool-page { display: none; }
    .tool-page.active {
      display: block;
      animation: pageIn 200ms ease-out;
    }
    @keyframes pageIn {
      from { opacity: 0; transform: translateY(4px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .page-title {
      font-family: var(--font-display);
      font-size: var(--text-xl);
      font-weight: 700;
      color: var(--color-text);
      margin-bottom: var(--space-2);
    }
    .page-subtitle {
      font-size: var(--text-sm);
      color: var(--color-text-muted);
      margin-bottom: var(--space-6);
    }

    /* ===== ENERGY CONVERTER ===== */
    .energy-card {
      max-width: 480px;
      margin: 0 auto;
    }

    .converter-row {
      display: flex;
      align-items: center;
      gap: var(--space-4);
    }
    .converter-field {
      flex: 1;
      text-align: center;
    }
    .converter-field label {
      display: block;
      font-size: var(--text-sm);
      font-weight: 500;
      color: var(--color-text-muted);
      margin-bottom: var(--space-2);
    }
    .converter-field input {
      text-align: center;
      font-size: var(--text-lg);
      font-weight: 500;
      font-variant-numeric: tabular-nums;
    }
    .converter-arrows {
      flex-shrink: 0;
      color: var(--color-primary);
      margin-top: var(--space-5);
    }
    .converter-arrows svg { width: 28px; height: 28px; }

    /* ===== COUNTER ===== */
    .counter-card {
      max-width: 400px;
      margin: 0 auto;
      text-align: center;
    }

    .counter-display {
      font-family: var(--font-display);
      font-size: clamp(3rem, 8vw, 6rem);
      font-weight: 700;
      color: var(--color-text);
      font-variant-numeric: tabular-nums;
      margin: var(--space-8) 0;
      line-height: 1.1;
    }

    .counter-actions {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: var(--space-4);
      margin-bottom: var(--space-6);
    }
    .counter-btn {
      width: 56px;
      height: 56px;
      border-radius: 50%;
      background: var(--color-primary);
      color: #fff;
      font-size: var(--text-xl);
      font-weight: 600;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background var(--transition-interactive), transform 100ms ease;
      user-select: none;
      -webkit-user-select: none;
    }
    .counter-btn:hover { background: var(--color-primary-hover); }
    .counter-btn:active { transform: scale(0.95); }

    .counter-reset {
      color: var(--color-text-muted);
      font-size: var(--text-sm);
      font-weight: 500;
      padding: var(--space-2) var(--space-4);
      transition: color var(--transition-interactive);
    }
    .counter-reset:hover { color: var(--color-error); }

    /* ===== PRICE CALCULATOR ===== */
    .price-card {
      max-width: 960px;
      margin: 0 auto;
    }

    .group-card {
      background: var(--color-surface);
      border: 1px solid oklch(from var(--color-text) l c h / 0.08);
      border-radius: var(--radius-lg);
      padding: var(--space-6);
      box-shadow: var(--shadow-sm);
      margin-bottom: var(--space-6);
    }

    .group-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: var(--space-4);
      padding-bottom: var(--space-3);
      border-bottom: 1px solid var(--color-divider);
    }
    .group-name {
      font-family: var(--font-display);
      font-size: var(--text-lg);
      font-weight: 600;
      color: var(--color-text);
    }

    .group-summary {
      font-size: var(--text-sm);
      color: var(--color-text-muted);
      margin-bottom: var(--space-4);
    }

    .group-empty {
      text-align: center;
      font-size: var(--text-sm);
      color: var(--color-text-faint);
      padding: var(--space-6) 0;
    }

    .group-add-form { margin-top: var(--space-4); padding-top: var(--space-4); border-top: 1px solid var(--color-divider); }
    .group-add-row {
      display: flex;
      gap: var(--space-2);
      align-items: center;
    }
    .group-add-row .input { font-size: var(--text-sm); padding: var(--space-2); }

    .item-card {
      background: var(--color-surface-2);
      border: 1px solid oklch(from var(--color-text) l c h / 0.06);
      border-radius: var(--radius-md);
      padding: var(--space-4);
      margin-bottom: var(--space-3);
      position: relative;
      overflow: hidden;
    }
    .item-card.cheapest {
      background: var(--color-success-highlight);
      border-left: 4px solid var(--color-success);
    }

    .item-card-inner {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: var(--space-4);
    }
    .item-info { flex: 1; min-width: 0; }
    .item-name {
      font-family: var(--font-display);
      font-size: var(--text-base);
      font-weight: 600;
      color: var(--color-text);
      margin-bottom: var(--space-1);
    }
    .item-cheapest-badge {
      display: inline-block;
      background: var(--color-success);
      color: #fff;
      font-size: var(--text-xs);
      font-weight: 600;
      padding: 2px var(--space-2);
      border-radius: var(--radius-sm);
      margin-left: var(--space-2);
      vertical-align: middle;
    }
    .item-spec {
      font-size: var(--text-xs);
      color: var(--color-text-muted);
    }
    .item-meta {
      text-align: right;
      flex-shrink: 0;
    }
    .item-total-price {
      font-size: var(--text-sm);
      color: var(--color-text);
    }
    .item-total-weight {
      font-size: var(--text-xs);
      color: var(--color-text-muted);
    }
    .item-unit-price {
      font-size: var(--text-base);
      color: var(--color-primary);
      font-weight: 600;
      font-variant-numeric: tabular-nums;
    }
    .item-unit-price-100 {
      font-size: var(--text-xs);
      color: var(--color-text-muted);
    }
    .item-actions {
      display: flex;
      gap: var(--space-2);
      justify-content: flex-end;
      margin-top: var(--space-3);
    }
    .item-actions .btn-ghost { font-size: var(--text-xs); padding: var(--space-1) var(--space-3); }
    .btn-delete:hover { color: var(--color-error); border-color: var(--color-error); }

    .item-edit-form {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: var(--space-3);
      margin-top: var(--space-3);
      padding-top: var(--space-3);
      border-top: 1px solid var(--color-divider);
    }
    .item-edit-form .full-width { grid-column: 1 / -1; }
    .item-edit-form .input { font-size: var(--text-sm); }

    .item-edit-actions {
      grid-column: 1 / -1;
      display: flex;
      gap: var(--space-2);
      justify-content: flex-end;
    }

    .price-empty {
      text-align: center;
      padding: var(--space-12) var(--space-6);
      color: var(--color-text-faint);
    }
    .price-empty svg {
      width: 64px;
      height: 64px;
      margin: 0 auto var(--space-4);
      color: var(--color-text-faint);
      opacity: 0.5;
    }
    .price-empty p { font-size: var(--text-sm); }

    /* ===== BOSS TIMER ===== */
    .boss-cards {
      display: flex;
      gap: var(--space-6);
      width: 100%;
      align-items: stretch;
    }
    .boss-card {
      flex: 1;
      background: var(--color-surface);
      border: 1px solid oklch(from var(--color-text) l c h / 0.08);
      border-radius: var(--radius-lg);
      padding: var(--space-10) var(--space-8);
      text-align: center;
      box-shadow: var(--shadow-md);
    }
    .boss-card.world  { --boss-accent: var(--color-boss-gold);  --boss-accent-dim: var(--color-boss-gold-dim); }
    .boss-card.normal { --boss-accent: var(--color-boss-red); --boss-accent-dim: var(--color-boss-red-dim); }
    .boss-card-title { font-size: var(--text-lg); font-weight: 700; color: var(--color-text); margin-bottom: var(--space-1); }
    .boss-label { font-size: var(--text-xs); color: var(--color-text-faint); text-transform: uppercase; letter-spacing: .12em; margin-bottom: var(--space-2); }
    .boss-spawn-time { font-size: var(--text-base); font-weight: 500; color: var(--color-text-muted); margin-bottom: var(--space-6); font-variant-numeric: tabular-nums; }
    .boss-countdown-row { display: flex; justify-content: center; margin-bottom: var(--space-2); }
    .boss-digit-row { display: flex; align-items: center; gap: var(--space-3); }
    .boss-digit-col { display: flex; flex-direction: column; align-items: center; gap: var(--space-1); }
    .boss-time-number {
      font-size: clamp(2rem, 1.2rem + 2.5vw, 3.5rem);
      font-weight: 700;
      color: var(--boss-accent);
      font-variant-numeric: tabular-nums;
      line-height: 1;
      min-width: 2.5ch;
      background: var(--color-surface-offset);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-md);
      padding: var(--space-3) var(--space-4);
    }
    .boss-time-unit { font-size: var(--text-xs); color: var(--color-text-faint); text-transform: uppercase; letter-spacing: .1em; }
    .boss-time-sep {
      font-size: var(--text-xl);
      font-weight: 700;
      color: var(--color-text-faint);
      line-height: 1;
      user-select: none;
      flex-shrink: 0;
      margin-bottom: calc(var(--text-xs) + var(--space-1));
    }
    @keyframes bossFlash { 0% { opacity: 1; } 40% { opacity: .35; } 100% { opacity: 1; } }
    .boss-flash { animation: bossFlash .35s ease-out; }

    .boss-toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: var(--space-4);
      margin-bottom: var(--space-6);
    }
    .boss-toolbar .page-title { margin-bottom: 0; }
    .boss-notify-btn { font-size: var(--text-sm); white-space: nowrap; }
    .boss-notify-btn[aria-pressed="true"] {
      color: var(--color-success);
      border-color: oklch(from var(--color-success) l c h / 0.4);
    }

    .boss-card { transition: box-shadow var(--transition-interactive), border-color var(--transition-interactive); }
    .boss-card.boss-soon {
      border-color: var(--boss-accent);
      box-shadow: 0 0 0 3px oklch(from var(--boss-accent) l c h / 0.2), var(--shadow-md);
    }
    @keyframes bossSpawnPulse {
      0% { box-shadow: 0 0 0 0 oklch(from var(--color-success) l c h / 0.55); }
      100% { box-shadow: 0 0 0 22px oklch(from var(--color-success) l c h / 0); }
    }
    .boss-card.boss-spawned { animation: bossSpawnPulse 1s ease-out 2; }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 639px) {
      .header {
        flex-wrap: wrap;
        height: auto;
        padding: var(--space-3) var(--space-4);
        gap: var(--space-3);
      }
      .tablist { flex: 1 0 100%; justify-content: center; }
      .tab-btn { padding: var(--space-2) var(--space-3); font-size: var(--text-xs); }
      .converter-row { flex-direction: column; gap: var(--space-3); }
      .converter-arrows { transform: rotate(90deg); margin-top: 0; }
      .item-card-inner { flex-direction: column; }
      .item-meta { text-align: left; }
      .item-edit-form { grid-template-columns: 1fr; }
      .counter-btn { width: 48px; height: 48px; }
      .group-add-row { flex-wrap: wrap; }
      .boss-cards { flex-direction: column; max-width: 480px; }
      .boss-card { padding: var(--space-8) var(--space-6); }
      .boss-time-number { font-size: var(--text-xl); padding: var(--space-2) var(--space-3); }
      .boss-toolbar { flex-wrap: wrap; }
    }

    @media (min-width: 1024px) {
      .container { padding: var(--space-10) var(--space-12); }
    }
  </style>
</head>
<body>
  <!-- ===== HEADER ===== -->
  <header class="header">
    <div class="logo">工具箱</div>
    <nav role="tablist" class="tablist">
      <button role="tab" class="tab-btn" aria-selected="true" aria-controls="page-energy" id="tab-energy" onclick="switchTab('energy')">热量换算</button>
      <button role="tab" class="tab-btn" aria-selected="false" aria-controls="page-counter" id="tab-counter" onclick="switchTab('counter')">计数器</button>
      <button role="tab" class="tab-btn" aria-selected="false" aria-controls="page-price" id="tab-price" onclick="switchTab('price')">比价计算</button>
      <button role="tab" class="tab-btn" aria-selected="false" aria-controls="page-timer" id="tab-timer" onclick="switchTab('timer')">Boss计时</button>
    </nav>
  </header>

  <!-- ===== MAIN ===== -->
  <main class="container">
    <!-- Energy Converter -->
    <section id="page-energy" class="tool-page active" role="tabpanel" aria-labelledby="tab-energy">
      <div class="card energy-card">
        <h1 class="page-title">热量换算</h1>
        <p class="page-subtitle">千焦（kJ）与千卡（kcal）互换</p>
        <div class="converter-row">
          <div class="converter-field">
            <label for="input-kj">千焦 (kJ)</label>
            <input id="input-kj" class="input" type="text" inputmode="decimal" placeholder="0.00" aria-label="千焦">
          </div>
          <div class="converter-arrows" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M9 3l-4 4 4 4"/>
              <path d="M15 21l4-4-4-4"/>
              <path d="M5 7h14"/>
              <path d="M19 17H5"/>
            </svg>
          </div>
          <div class="converter-field">
            <label for="input-kcal">千卡 (kcal)</label>
            <input id="input-kcal" class="input" type="text" inputmode="decimal" placeholder="0.00" aria-label="千卡">
          </div>
        </div>
      </div>
    </section>

    <!-- Counter -->
    <section id="page-counter" class="tool-page" role="tabpanel" aria-labelledby="tab-counter">
      <div class="card counter-card">
        <h1 class="page-title">计数器</h1>
        <div class="counter-display" id="counter-value" aria-live="polite">0</div>
        <div class="counter-actions">
          <button class="counter-btn" id="btn-minus" aria-label="减少">−</button>
          <button class="counter-reset" id="btn-reset" aria-label="重置">重置</button>
          <button class="counter-btn" id="btn-plus" aria-label="增加">+</button>
        </div>
      </div>
    </section>

    <!-- Price Calculator -->
    <section id="page-price" class="tool-page" role="tabpanel" aria-labelledby="tab-price">
      <div class="price-card">
        <h1 class="page-title">商品单价对比</h1>
        <p class="page-subtitle">创建对比组，组内商品独立比较，组间互不影响</p>

        <!-- Create group -->
        <div class="card" style="margin-bottom:var(--space-6)">
          <h2 style="font-family:var(--font-display);font-size:var(--text-lg);font-weight:600;margin-bottom:var(--space-4)">新建对比组</h2>
          <form id="create-group-form" style="display:flex;gap:var(--space-3)" novalidate>
            <input id="new-group-name" class="input" type="text" placeholder="如：薯片对比、洗衣液对比" required aria-label="组名称" style="flex:1">
            <button type="submit" class="btn-primary" style="white-space:nowrap">创建组</button>
          </form>
        </div>

        <!-- Group list -->
        <div id="price-list"></div>

        <!-- Empty state -->
        <div class="price-empty" id="price-empty">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/>
            <line x1="3" y1="6" x2="21" y2="6"/>
            <path d="M16 10a4 4 0 01-8 0"/>
          </svg>
          <p>创建一个对比组，开始比价</p>
        </div>
      </div>
    </section>

    <!-- Boss Timer -->
    <section id="page-timer" class="tool-page" role="tabpanel" aria-labelledby="tab-timer">
      <div class="boss-toolbar">
        <h1 class="page-title">Boss 计时</h1>
        <button id="boss-notify-toggle" class="btn-ghost boss-notify-btn" aria-pressed="false">开启刷新提醒</button>
      </div>
      <div class="boss-cards">
        <div class="boss-card normal">
          <p class="boss-card-title">巢穴首领</p>
          <p class="boss-label">下次刷新时间</p>
          <p class="boss-spawn-time" id="n-spawn">计算中…</p>
          <p class="boss-label">距离刷新还有</p>
          <div class="boss-countdown-row" role="timer" aria-live="polite">
            <div class="boss-digit-row">
              <div class="boss-digit-col">
                <span class="boss-time-number" id="n-m">00</span>
                <span class="boss-time-unit">分</span>
              </div>
              <span class="boss-time-sep" aria-hidden="true">:</span>
              <div class="boss-digit-col">
                <span class="boss-time-number" id="n-s">00</span>
                <span class="boss-time-unit">秒</span>
              </div>
            </div>
          </div>
        </div>

        <div class="boss-card world">
          <p class="boss-card-title">世界首领</p>
          <p class="boss-label">下次刷新时间</p>
          <p class="boss-spawn-time" id="w-spawn">计算中…</p>
          <p class="boss-label">距离刷新还有</p>
          <div class="boss-countdown-row" role="timer" aria-live="polite">
            <div class="boss-digit-row">
              <div class="boss-digit-col">
                <span class="boss-time-number" id="w-h">00</span>
                <span class="boss-time-unit">时</span>
              </div>
              <span class="boss-time-sep" aria-hidden="true">:</span>
              <div class="boss-digit-col">
                <span class="boss-time-number" id="w-m">00</span>
                <span class="boss-time-unit">分</span>
              </div>
              <span class="boss-time-sep" aria-hidden="true">:</span>
              <div class="boss-digit-col">
                <span class="boss-time-number" id="w-s">00</span>
                <span class="boss-time-unit">秒</span>
              </div>
            </div>
          </div>
        </div>
      </div>
    </section>
  </main>

  <script>
    /* ===== TAB NAVIGATION ===== */
    const TAB_IDS = ['energy', 'counter', 'price', 'timer'];
    const ACTIVE_TAB_KEY = 'toolbox_active_tab';

    function setActiveTab(tabId) {
      if (!TAB_IDS.includes(tabId)) tabId = 'energy';
      document.querySelectorAll('.tool-page').forEach(p => p.classList.remove('active'));
      document.querySelectorAll('.tab-btn').forEach(b => b.setAttribute('aria-selected', 'false'));
      const page = document.getElementById('page-' + tabId);
      if (page) page.classList.add('active');
      const tab = document.getElementById('tab-' + tabId);
      if (tab) tab.setAttribute('aria-selected', 'true');
    }

    function switchTab(tabId) {
      if (!TAB_IDS.includes(tabId)) return;
      setActiveTab(tabId);
      const tab = document.getElementById('tab-' + tabId);
      if (tab) tab.focus({ preventScroll: true });
      try { localStorage.setItem(ACTIVE_TAB_KEY, tabId); } catch (e) {}
      if (location.hash !== '#' + tabId) {
        history.replaceState(null, '', '#' + tabId);
      }
    }

    function restoreTab() {
      const hash = location.hash.replace('#', '');
      if (TAB_IDS.includes(hash)) return hash;
      try {
        const saved = localStorage.getItem(ACTIVE_TAB_KEY);
        if (saved && TAB_IDS.includes(saved)) return saved;
      } catch (e) {}
      return 'energy';
    }

    /* ===== ENERGY CONVERTER ===== */
    function convertKjToKcal(kj) { return kj / 4.184; }
    function convertKcalToKj(kcal) { return kcal * 4.184; }

    function initEnergyConverter() {
      const inputKj = document.getElementById('input-kj');
      const inputKcal = document.getElementById('input-kcal');

      let updating = false;

      inputKj.addEventListener('input', function() {
        if (updating) return;
        const val = parseFloat(this.value);
        if (isNaN(val) || this.value.trim() === '') {
          updating = true;
          inputKcal.value = '';
          updating = false;
          return;
        }
        updating = true;
        inputKcal.value = convertKjToKcal(val).toFixed(2);
        updating = false;
      });

      inputKcal.addEventListener('input', function() {
        if (updating) return;
        const val = parseFloat(this.value);
        if (isNaN(val) || this.value.trim() === '') {
          updating = true;
          inputKj.value = '';
          updating = false;
          return;
        }
        updating = true;
        inputKj.value = convertKcalToKj(val).toFixed(2);
        updating = false;
      });
    }

    /* ===== COUNTER ===== */
    const COUNTER_KEY = 'toolbox_counter';
    let counterState = { value: 0 };
    let longPressTimer = null;
    let longPressInterval = null;
    let longPressStep = 1;

    function loadCounter() {
      try {
        const raw = localStorage.getItem(COUNTER_KEY);
        if (raw !== null) counterState.value = parseInt(raw, 10) || 0;
      } catch (e) {}
      document.getElementById('counter-value').textContent = counterState.value;
    }

    function updateCounter(delta) {
      counterState.value += delta;
      document.getElementById('counter-value').textContent = counterState.value;
      try { localStorage.setItem(COUNTER_KEY, String(counterState.value)); } catch (e) {}
    }

    function resetCounter() {
      counterState.value = 0;
      document.getElementById('counter-value').textContent = 0;
      try { localStorage.setItem(COUNTER_KEY, '0'); } catch (e) {}
    }

    function initCounter() {
      loadCounter();
      const btnPlus = document.getElementById('btn-plus');
      const btnMinus = document.getElementById('btn-minus');
      const btnReset = document.getElementById('btn-reset');

      function doPlus() { updateCounter(longPressStep); }
      function doMinus() { updateCounter(-longPressStep); }

      function startLongPress(actionFn) {
        // Accelerate: step grows and interval shrinks the longer you hold.
        longPressStep = 1;
        longPressTimer = setTimeout(() => {
          let ticks = 0;
          longPressInterval = setInterval(() => {
            actionFn();
            ticks++;
            if (ticks % 8 === 0) longPressStep = Math.min(longPressStep * 2, 100);
          }, 90);
        }, 450);
      }

      function stopLongPress() {
        clearTimeout(longPressTimer);
        clearInterval(longPressInterval);
        longPressTimer = null;
        longPressInterval = null;
        longPressStep = 1;
      }

      btnPlus.addEventListener('pointerdown', e => { e.preventDefault(); doPlus(); startLongPress(doPlus); });
      btnPlus.addEventListener('pointerup', stopLongPress);
      btnPlus.addEventListener('pointerleave', stopLongPress);
      btnPlus.addEventListener('pointercancel', stopLongPress);

      btnMinus.addEventListener('pointerdown', e => { e.preventDefault(); doMinus(); startLongPress(doMinus); });
      btnMinus.addEventListener('pointerup', stopLongPress);
      btnMinus.addEventListener('pointerleave', stopLongPress);
      btnMinus.addEventListener('pointercancel', stopLongPress);

      btnReset.addEventListener('click', resetCounter);
    }

    /* ===== PRICE CALCULATOR ===== */
    let groups = []; // [{ id, name, items: [...] }]
    let editingId = null;
    let editingGroupId = null;
    let nextGroupId = 1;
    let nextItemId = 1;

    function calcUnitPrice(item) {
      const totalWeight = item.unitWeight * item.packSize * item.packCount;
      if (totalWeight <= 0) return null;
      return item.totalPrice / totalWeight;
    }

    function findCheapestInGroup(items) {
      if (items.length === 0) return [];
      // Only compare items that have a valid unit price; invalid ones never count.
      const priced = items
        .map(item => ({ id: item.id, unitPrice: calcUnitPrice(item) }))
        .filter(w => w.unitPrice !== null && w.unitPrice > 0);
      if (priced.length === 0) return [];
      const minPrice = Math.min(...priced.map(w => w.unitPrice));
      return priced.filter(w => w.unitPrice === minPrice).map(w => w.id);
    }

    function saveGroups() {
      try {
        localStorage.setItem('toolbox_price_groups', JSON.stringify({ groups, nextGroupId, nextItemId }));
      } catch (e) {}
    }

    function loadGroups() {
      try {
        const raw = localStorage.getItem('toolbox_price_groups');
        if (raw) {
          const parsed = JSON.parse(raw);
          if (parsed.groups && Array.isArray(parsed.groups)) {
            groups = parsed.groups;
            nextGroupId = parsed.nextGroupId || 1;
            nextItemId = parsed.nextItemId || 1;
            if (groups.length > 0) {
              nextGroupId = Math.max(...groups.map(g => g.id)) + 1;
              for (const g of groups) {
                if (g.items.length > 0) {
                  const maxId = Math.max(...g.items.map(i => i.id));
                  if (maxId >= nextItemId) nextItemId = maxId + 1;
                }
              }
            }
          }
        }
      } catch (e) {
        groups = [];
      }
    }

    function addGroup(name) {
      groups.push({ id: nextGroupId++, name, items: [] });
      saveGroups();
      renderPriceList();
    }

    function deleteGroup(groupId) {
      groups = groups.filter(g => g.id !== groupId);
      saveGroups();
      renderPriceList();
    }

    function addItemToGroup(groupId, formData) {
      const group = groups.find(g => g.id === groupId);
      if (!group) return;
      const item = {
        id: nextItemId++,
        name: formData.name || ('商品 ' + (group.items.length + 1)),
        unitWeight: parseFloat(formData.unitWeight),
        packSize: parseInt(formData.packSize) || 1,
        packCount: parseInt(formData.packCount) || 1,
        totalPrice: parseFloat(formData.totalPrice)
      };
      group.items.push(item);
      saveGroups();
      renderPriceList();
    }

    function deleteItemFromGroup(groupId, itemId) {
      const group = groups.find(g => g.id === groupId);
      if (!group) return;
      group.items = group.items.filter(i => i.id !== itemId);
      saveGroups();
      renderPriceList();
    }

    function startEditItem(groupId, itemId) {
      editingGroupId = groupId;
      editingId = itemId;
      renderPriceList();
    }

    function cancelEdit() {
      editingId = null;
      editingGroupId = null;
      renderPriceList();
    }

    function saveEditItem(groupId, itemId) {
      const form = document.getElementById('edit-form-' + itemId);
      const nameEl = form.querySelector('.edit-name');
      const uwEl = form.querySelector('.edit-unit-weight');
      const psEl = form.querySelector('.edit-pack-size');
      const pcEl = form.querySelector('.edit-pack-count');
      const tpEl = form.querySelector('.edit-total-price');

      const unitWeight = parseFloat(uwEl.value);
      const totalPrice = parseFloat(tpEl.value);
      if (isNaN(unitWeight) || unitWeight <= 0 || isNaN(totalPrice) || totalPrice <= 0) return;

      const group = groups.find(g => g.id === groupId);
      if (!group) return;
      const item = group.items.find(i => i.id === itemId);
      if (!item) return;
      item.name = nameEl.value.trim() || item.name;
      item.unitWeight = unitWeight;
      item.packSize = parseInt(psEl.value) || 1;
      item.packCount = parseInt(pcEl.value) || 1;
      item.totalPrice = totalPrice;

      editingId = null;
      editingGroupId = null;
      saveGroups();
      renderPriceList();
    }

    function renderPriceList() {
      const list = document.getElementById('price-list');
      const empty = document.getElementById('price-empty');

      if (groups.length === 0) {
        list.innerHTML = '';
        empty.style.display = 'block';
        return;
      }
      empty.style.display = 'none';

      list.innerHTML = groups.map(group => {
        const cheapestIds = findCheapestInGroup(group.items);
        const itemsHtml = group.items.length === 0
          ? '<div class="group-empty">该组暂无商品，请在下方表单中添加</div>'
          : group.items.map(item => {
              const up = calcUnitPrice(item);
              const isCheapest = cheapestIds.includes(item.id);
              const totalWeight = item.unitWeight * item.packSize * item.packCount;
              const isEditing = editingId === item.id && editingGroupId === group.id;

              let cardClass = 'item-card';
              if (isCheapest && group.items.length > 1) cardClass += ' cheapest';

              let body = '';
              if (isEditing) {
                body = `<div class="item-card-inner">
                    <div class="item-info">
                      <div class="item-name">${escHtml(item.name)}${isCheapest && group.items.length > 1 ? '<span class="item-cheapest-badge">最划算 ✓</span>' : ''}</div>
                      <div class="item-spec">${item.unitWeight}g × ${item.packSize}件 × ${item.packCount}套</div>
                    </div>
                  </div>
                  <form class="item-edit-form" id="edit-form-${item.id}" onsubmit="event.preventDefault(); saveEditItem(${group.id}, ${item.id});">
                    <div class="form-field full-width">
                      <label>商品名称</label>
                      <input class="input edit-name" type="text" value="${escHtml(item.name)}">
                    </div>
                    <div class="form-field">
                      <label>单品重量 (g)</label>
                      <input class="input edit-unit-weight" type="number" min="0.01" step="0.01" value="${item.unitWeight}" required>
                    </div>
                    <div class="form-field">
                      <label>套装内数量</label>
                      <input class="input edit-pack-size" type="number" min="1" step="1" value="${item.packSize}">
                    </div>
                    <div class="form-field">
                      <label>套装数量</label>
                      <input class="input edit-pack-count" type="number" min="1" step="1" value="${item.packCount}">
                    </div>
                    <div class="form-field">
                      <label>总价 (元)</label>
                      <input class="input edit-total-price" type="number" min="0.01" step="0.01" value="${item.totalPrice}" required>
                    </div>
                    <div class="item-edit-actions">
                      <button type="button" class="btn-ghost" onclick="cancelEdit()">取消</button>
                      <button type="submit" class="btn-primary" style="font-size:var(--text-sm);padding:var(--space-1) var(--space-4)">保存</button>
                    </div>
                  </form>`;
              } else {
                body = `<div class="item-card-inner">
                    <div class="item-info">
                      <div class="item-name">${escHtml(item.name)}${isCheapest && group.items.length > 1 ? '<span class="item-cheapest-badge">最划算 ✓</span>' : ''}</div>
                      <div class="item-spec">${item.unitWeight}g × ${item.packSize}件 × ${item.packCount}套</div>
                    </div>
                    <div class="item-meta">
                      <div class="item-total-price">¥${item.totalPrice.toFixed(2)} 元</div>
                      <div class="item-total-weight">${totalWeight.toFixed(1)} g</div>
                      <div class="item-unit-price">${up !== null ? up.toFixed(4) : '--'} 元/g</div>
                      <div class="item-unit-price-100">≈ ${up !== null ? (up * 100).toFixed(2) : '--'} 元/100g</div>
                    </div>
                  </div>
                  <div class="item-actions">
                    <button class="btn-ghost" onclick="startEditItem(${group.id}, ${item.id})" aria-label="编辑">编辑</button>
                    <button class="btn-ghost btn-delete" onclick="deleteItemFromGroup(${group.id}, ${item.id})" aria-label="删除">删除</button>
                  </div>`;
              }
              return '<div class="' + cardClass + '">' + body + '</div>';
            }).join('');

        const summaryHtml = group.items.length > 0 ? (() => {
          const prices = group.items.map(i => i.totalPrice);
          const cheapestItems = group.items.filter(i => cheapestIds.includes(i.id));
          const cheapestPrice = cheapestItems.length > 0 ? calcUnitPrice(cheapestItems[0]) : null;
          const pricedItems = group.items.filter(i => calcUnitPrice(i) !== null);
          const maxPrice = pricedItems.length > 0
            ? Math.max(...pricedItems.map(i => calcUnitPrice(i)))
            : null;
          let percentStr = '--';
          if (cheapestPrice !== null && maxPrice !== null && maxPrice > 0) {
            percentStr = ((maxPrice - cheapestPrice) / maxPrice * 100).toFixed(1) + '%';
          }
          return '<div class="group-summary">共 ' + group.items.length + ' 件商品 · 价格区间 ¥' +
            Math.min(...prices).toFixed(2) + ' ~ ¥' + Math.max(...prices).toFixed(2) +
            ' · 最划算比最贵便宜 ' + percentStr + '</div>';
        })() : '';

        const addFormHtml = `<div class="group-add-form">
          <form class="group-add-item-form" id="add-form-${group.id}" novalidate>
            <div class="group-add-row">
              <input class="input" type="text" placeholder="商品名称" data-field="name" style="min-width:120px">
              <input class="input" type="number" min="0.01" step="0.01" placeholder="单品重量(g) *" data-field="unitWeight" style="min-width:100px" required>
              <input class="input" type="number" min="1" step="1" placeholder="件数" data-field="packSize" value="1" style="min-width:60px">
              <input class="input" type="number" min="1" step="1" placeholder="套数" data-field="packCount" value="1" style="min-width:60px">
              <input class="input" type="number" min="0.01" step="0.01" placeholder="总价(元) *" data-field="totalPrice" style="min-width:100px" required>
              <button type="submit" class="btn-primary" style="font-size:var(--text-xs);padding:var(--space-2) var(--space-3);white-space:nowrap">添加</button>
            </div>
          </form>
        </div>`;

        return `<div class="group-card">
          <div class="group-header">
            <h2 class="group-name">${escHtml(group.name) || '未命名组'}</h2>
            <button class="btn-ghost btn-delete" style="font-size:var(--text-xs);padding:var(--space-1) var(--space-3)" onclick="deleteGroup(${group.id})" aria-label="删除组">删除组</button>
          </div>
          ${summaryHtml}
          <div class="group-items">${itemsHtml}</div>
          ${addFormHtml}
        </div>`;
      }).join('');

      // Bind add-to-group form handlers
      groups.forEach(group => {
        const form = document.getElementById('add-form-' + group.id);
        if (!form) return;
        form.addEventListener('submit', function(e) {
          e.preventDefault();
          const unitWeight = parseFloat(form.querySelector('[data-field="unitWeight"]').value);
          const totalPrice = parseFloat(form.querySelector('[data-field="totalPrice"]').value);
          if (isNaN(unitWeight) || unitWeight <= 0 || isNaN(totalPrice) || totalPrice <= 0) {
            return;
          }
          const formData = {
            name: form.querySelector('[data-field="name"]').value.trim(),
            unitWeight: unitWeight,
            packSize: form.querySelector('[data-field="packSize"]').value,
            packCount: form.querySelector('[data-field="packCount"]').value,
            totalPrice: totalPrice
          };
          addItemToGroup(group.id, formData);
          form.reset();
          form.querySelector('[data-field="packSize"]').value = '1';
          form.querySelector('[data-field="packCount"]').value = '1';
        });
      });
    }

    function escHtml(str) {
      const div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }

    function initPriceCalculator() {
      loadGroups();
      renderPriceList();

      const createGroupForm = document.getElementById('create-group-form');
      if (createGroupForm) {
        createGroupForm.addEventListener('submit', function(e) {
          e.preventDefault();
          const name = document.getElementById('new-group-name').value.trim();
          if (!name) return;
          addGroup(name);
          document.getElementById('new-group-name').value = '';
        });
      }
    }

    /* ===== BOSS TIMER ===== */
    function initBossTimer() {
      const NOTIFY_KEY = 'toolbox_boss_notify';
      const originalTitle = document.title;
      let notifyEnabled = false;
      try { notifyEnabled = localStorage.getItem(NOTIFY_KEY) === '1'; } catch (e) {}

      function pad(n) { return String(n).padStart(2, '0'); }
      function flash(el) { el.classList.remove('boss-flash'); void el.offsetWidth; el.classList.add('boss-flash'); }
      function fmtDate(ts) {
        return new Date(ts).toLocaleString('zh-CN', {
          month: '2-digit', day: '2-digit',
          hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false
        }).replace(/\//g, '-');
      }
      function getNext(baseMs, intervalMs) {
        const now = Date.now();
        const elapsed = now - baseMs;
        return baseMs + (Math.floor(elapsed / intervalMs) + 1) * intervalMs;
      }
      function fmtCountdown(totalSecs, hasHours) {
        if (hasHours) {
          const h = Math.floor(totalSecs / 3600);
          const m = Math.floor((totalSecs % 3600) / 60);
          const s = totalSecs % 60;
          return pad(h) + ':' + pad(m) + ':' + pad(s);
        }
        const m = Math.floor(totalSecs / 60);
        const s = totalSecs % 60;
        return pad(m) + ':' + pad(s);
      }

      function notifySpawn(cfg) {
        if (!notifyEnabled || !('Notification' in window) || Notification.permission !== 'granted') return;
        try {
          new Notification(cfg.title + '已刷新', {
            body: '首领已出现，快去挑战！',
            tag: 'boss-' + cfg.key,
          });
        } catch (e) {}
      }

      function onSpawn(cfg) {
        // Distinct spawn pulse so a refresh is obvious even without watching the digits.
        cfg.card.classList.remove('boss-spawned');
        void cfg.card.offsetWidth;
        cfg.card.classList.add('boss-spawned');
        notifySpawn(cfg);
      }

      const WORLD = {
        key: 'world', title: '世界首领',
        base: new Date('2023-10-27T22:00:00+08:00').getTime(),
        interval: 12600 * 1000,
        els: { spawn: document.getElementById('w-spawn'), h: document.getElementById('w-h'), m: document.getElementById('w-m'), s: document.getElementById('w-s') },
        card: document.querySelector('.boss-card.world'),
        prev: { h: -1, m: -1, s: -1 }, next: 0, hasHours: true, notifiedFor: undefined,
      };
      const NORMAL = {
        key: 'normal', title: '巢穴首领',
        base: new Date('2026-03-31T18:45:00+08:00').getTime(),
        interval: 2700 * 1000,
        els: { spawn: document.getElementById('n-spawn'), m: document.getElementById('n-m'), s: document.getElementById('n-s') },
        card: document.querySelector('.boss-card.normal'),
        prev: { m: -1, s: -1 }, next: 0, hasHours: false, notifiedFor: undefined,
      };

      function updateCard(cfg) {
        const now = Date.now();
        if (now >= cfg.next) cfg.next = getNext(cfg.base, cfg.interval);
        // Detect a rollover into the next cycle → fire spawn effects once.
        if (cfg.notifiedFor !== undefined && cfg.next !== cfg.notifiedFor) onSpawn(cfg);
        cfg.notifiedFor = cfg.next;

        cfg.els.spawn.textContent = fmtDate(cfg.next);
        const remaining = Math.max(0, cfg.next - now);
        const totalSecs = Math.floor(remaining / 1000);
        const h = Math.floor(totalSecs / 3600);
        const m = Math.floor((totalSecs % 3600) / 60);
        const s = totalSecs % 60;
        if (cfg.hasHours) {
          if (h !== cfg.prev.h) { cfg.els.h.textContent = pad(h); flash(cfg.els.h); cfg.prev.h = h; }
          if (m !== cfg.prev.m) { cfg.els.m.textContent = pad(m); flash(cfg.els.m); cfg.prev.m = m; }
          if (s !== cfg.prev.s) { cfg.els.s.textContent = pad(s); flash(cfg.els.s); cfg.prev.s = s; }
        } else {
          const totalM = Math.floor(totalSecs / 60);
          if (totalM !== cfg.prev.m) { cfg.els.m.textContent = pad(totalM); flash(cfg.els.m); cfg.prev.m = totalM; }
          if (s !== cfg.prev.s) { cfg.els.s.textContent = pad(s); flash(cfg.els.s); cfg.prev.s = s; }
        }

        // Urgency highlight in the final minute before a spawn.
        if (totalSecs > 0 && totalSecs <= 60) cfg.card.classList.add('boss-soon');
        else cfg.card.classList.remove('boss-soon');

        return totalSecs;
      }

      function tick() {
        const ws = updateCard(WORLD);
        const ns = updateCard(NORMAL);
        // Show a countdown in the tab title while the page is in the background.
        if (document.hidden) {
          document.title = '巢穴 ' + fmtCountdown(ns, false) + ' · 世界 ' + fmtCountdown(ws, true) + ' — ' + originalTitle;
        } else if (document.title !== originalTitle) {
          document.title = originalTitle;
        }
      }

      // Notification toggle
      const toggleBtn = document.getElementById('boss-notify-toggle');
      function syncToggle() {
        if (!toggleBtn) return;
        const supported = ('Notification' in window);
        const on = notifyEnabled && supported && Notification.permission === 'granted';
        toggleBtn.setAttribute('aria-pressed', on ? 'true' : 'false');
        toggleBtn.textContent = on ? '刷新提醒已开启' : '开启刷新提醒';
      }
      if (toggleBtn) {
        syncToggle();
        toggleBtn.addEventListener('click', async () => {
          if (!('Notification' in window)) { alert('当前浏览器不支持桌面通知'); return; }
          if (Notification.permission === 'granted') {
            notifyEnabled = !notifyEnabled;
          } else if (Notification.permission === 'denied') {
            alert('通知权限已被拒绝，请在浏览器站点设置中重新开启');
            return;
          } else {
            const perm = await Notification.requestPermission();
            if (perm !== 'granted') { syncToggle(); return; }
            notifyEnabled = true;
          }
          try { localStorage.setItem(NOTIFY_KEY, notifyEnabled ? '1' : '0'); } catch (e) {}
          syncToggle();
        });
      }

      document.addEventListener('visibilitychange', () => {
        if (!document.hidden && document.title !== originalTitle) document.title = originalTitle;
      });

      tick();
      setInterval(tick, 1000);
    }

    /* ===== INIT ===== */
    document.addEventListener('DOMContentLoaded', () => {
      setActiveTab(restoreTab());
      window.addEventListener('hashchange', () => {
        const hash = location.hash.replace('#', '');
        if (TAB_IDS.includes(hash)) setActiveTab(hash);
      });

      initEnergyConverter();
      initCounter();
      initPriceCalculator();
      initBossTimer();
    });
  </script>
</body>
</html>
